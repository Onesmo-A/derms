version: '3.8'

services:
  # PHP Application (Laravel API and core logic)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: derms-app:latest
    container_name: derms_app
    restart: unless-stopped
    volumes:
      - .env:/var/www/.env
    depends_on:
      - db
      - redis
    networks:
      - derms_network

  # Nginx Web Server (Serves frontend and proxies API)
  web:
    image: nginx:alpine
    container_name: derms_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - derms_network

  # Redis (Cache, Sessions, Queue management)
  redis:
    image: redis:alpine
    container_name: derms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - derms_network

  # PostgreSQL Database (Production relational storage)
  db:
    image: postgres:17-alpine
    container_name: derms_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-derms}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - derms_network

  # Laravel Queue Worker (Processes results generation and ranking asynchronously)
  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: derms_queue_worker
    restart: unless-stopped
    volumes:
      - .env:/var/www/.env
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    depends_on:
      - redis
      - app
    networks:
      - derms_network

networks:
  derms_network:
    driver: bridge

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
